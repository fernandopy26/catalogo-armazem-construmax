<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="color-scheme" content="dark">
  <title>Acesso Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0806;
      --surface:  #17120c;
      --surface-2:#1f1811;
      --border:   rgba(212,160,69,.14);
      --border-2: rgba(212,160,69,.28);
      --accent:   #d4a045;
      --accent-s: #ebc478;
      --accent-g: rgba(212,160,69,.16);
      --text-1:   #f5eee0;
      --text-2:   #c2b5a0;
      --text-3:   #7d6f5a;
      --green:    #22c55e;
      --red:      #ff8a80;
      --ease:     cubic-bezier(.22,1,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { color-scheme: only dark; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: "Inter", -apple-system, Arial, sans-serif;
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      padding: 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(900px 600px at 50% 30%, rgba(212,160,69,.12), transparent 60%),
        radial-gradient(600px 400px at 80% 80%, rgba(90,55,25,.18), transparent 70%),
        url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='600' height='350'%3E%3Cfilter id='w'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.012 0.42' numOctaves='3' seed='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.36  0 0 0 0 0.18  0 0 0 0.28 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23w)'/%3E%3C/svg%3E"),
        linear-gradient(160deg, #140e09, #0a0806);
      background-size: auto, auto, 900px auto, auto;
      opacity: .65;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background:
        linear-gradient(180deg, rgba(31,24,17,.98), rgba(15,10,6,1)),
        url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='400' height='300'%3E%3Cfilter id='s'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.013 0.40' numOctaves='3' seed='11' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.50  0 0 0 0 0.32  0 0 0 0 0.15  0 0 0 0.55 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23s)'/%3E%3C/svg%3E");
      background-size: auto, 500px auto;
      border: 1px solid var(--border-2);
      border-radius: 24px;
      padding: 36px 32px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: 0; left: 32px; right: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-2), transparent);
    }

    /* Orb decorativo */
    .login-orb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #f6d68a, var(--accent) 50%, #8a6320);
      box-shadow: 0 0 40px rgba(212,160,69,.35);
      margin: 0 auto 20px;
    }

    .login-titulo {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      color: var(--text-1);
    }

    .login-sub {
      margin: 0 0 28px;
      text-align: center;
      font-size: 13.5px;
      color: var(--text-3);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .field-icon-wrap {
      position: relative;
    }

    .field-icon-wrap input { padding-left: 40px; }

    .field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px 12px 40px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-1);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-g);
    }

    input::placeholder { color: var(--text-3); }

    .btn-entrar {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: #1a1404;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 20px rgba(212,160,69,.28);
      transition: filter .2s, transform .15s;
      touch-action: manipulation;
    }

    .btn-entrar:hover { filter: brightness(1.08); }
    .btn-entrar:active { transform: scale(.98); }

    .btn-entrar:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .erro {
      min-height: 20px;
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: var(--red);
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
    }

    .login-footer a {
      font-size: 13px;
      color: var(--text-3);
      text-decoration: none;
      transition: color .2s;
    }

    .login-footer a:hover { color: var(--accent-s); }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-orb"></div>
    <h1 class="login-titulo">Painel Admin</h1>
    <p class="login-sub">Faça login para gerenciar o catálogo</p>

    <div class="field-group">
      <label class="field-label" for="email">E-mail</label>
      <div class="field-icon-wrap">
        <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" autofocus>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="senha">Senha</label>
      <div class="field-icon-wrap">
        <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button id="btnEntrar" class="btn-entrar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Entrar
    </button>

    <div id="erroLogin" class="erro" role="alert" aria-live="polite"></div>

    <div class="login-footer">
      <a href="../index.html">← Voltar ao catálogo</a>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
