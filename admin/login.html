<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login do Admin</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11151b;
      font-family: Arial, sans-serif;
      color: white;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      background: #1b212b;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #25d366;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .erro {
      margin-top: 12px;
      color: #ff8e8e;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login do Admin</h1>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button id="btnEntrar">Entrar</button>
    <div id="erroLogin" class="erro"></div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
